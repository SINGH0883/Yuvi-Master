<!DOCTYPE html>
<html>
<head>
<title>Yuvi Master</title>
<meta charset="UTF-8">
  <style>
    body {
      margin: 0;
      height: 220px;
      display: flex;
      justify-content: center;
      align-items: center;

      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;

      background: linear-gradient(135deg, #0f2027, #2c5364);
    }

    .card {
      width: 260px;
      padding: 25px;
      border-radius: 18px;
      text-align: center;
      color: white;

      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);

      border: 1px solid rgba(255,255,255,0.2);
      box-shadow: 0 10px 40px rgba(0,0,0,0.4);

      opacity: 0;
      transform: scale(0.85);
      animation: fadeIn 0.9s ease forwards;
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    .logo {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .tagline {
      font-size: 13px;
      opacity: 0.85;
      margin-bottom: 15px;
    }

    .emoji {
      font-size: 26px;
      margin: 8px 0;
      animation: bounce 1.8s infinite;
    }

    @keyframes bounce {
      0%,100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .thanks {
      font-size: 15px;
      font-weight: 500;
      margin-top: 5px;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow {
      from { text-shadow: 0 0 5px #fff; }
      to { text-shadow: 0 0 15px #00f2ff; }
    }

    .footer {
      margin-top: 10px;
      font-size: 11px;
      opacity: 0.7;
    }
  </style>
</head>

<body>

<div class="card">
  <div class="logo">✨ Yuvi Master</div>
  <div class="tagline">Smart Copy & Paste Tool ⚡</div>

  <div class="emoji">🚀</div>

  <div class="thanks">Thanks for using 😊</div>

  <div class="footer">Made by ❤️ Yuvraj Singh</div>
</div>

</body>
</html>
